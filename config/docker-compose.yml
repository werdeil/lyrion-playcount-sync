version: '3.8'

services:
  lyrion-sync:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: lyrion-playcount-sync
    
    restart: unless-stopped
    
    environment:
      # VNC Configuration
      - DISPLAY=:99
      - VNC_PASSWORD=${VNC_PASSWORD:-changeme}
      - VNC_PORT=${VNC_PORT:-5900}
      - NOVNC_PORT=${NOVNC_PORT:-6080}
      - VNC_WIDTH=${VNC_WIDTH:-1280}
      - VNC_HEIGHT=${VNC_HEIGHT:-1024}
      - VNC_DEPTH=${VNC_DEPTH:-24}
      
      # Application Configuration
      - LYRION_DB_PATH=/lyrion-data/persist.db
      - TZ=Europe/Paris
    
    volumes:
      # Configuration de l'application
      - ./config.yaml:/app/config.yaml
      - ./logs:/app/logs
      
      # Base de données Lyrion (LECTURE/ÉCRITURE)
      # ⚠️ IMPORTANT: Arrêter Lyrion avant de démarrer ce service!
      # Adapter le chemin selon votre installation Lyrion
      - ${LYRION_DATA_PATH:-/path/to/lyrion/config}:/lyrion-data
    
    ports:
      # VNC direct
      - "${VNC_PORT:-5900}:5900"
      
      # noVNC (accès web)
      - "${NOVNC_PORT:-6080}:6080"
    
    networks:
      - homelab
    
    # Configuration pour Traefik (reverse proxy)
    labels:
      - "traefik.enable=false"
      # Décommenter pour utiliser avec Traefik
      # - "traefik.enable=true"
      # - "traefik.http.routers.lyrion-sync.rule=Host(`lyrion-sync.local`)"
      # - "traefik.http.services.lyrion-sync.loadbalancer.server.port=6080"
    
    # Ressources
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

networks:
  homelab:
    driver: bridge
    # Décommenter pour utiliser un réseau existant
    # external: true
